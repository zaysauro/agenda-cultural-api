name: Update Agenda

on:
  schedule:
    - cron: "0 9,21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-agenda:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit updated agenda
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/agenda.json
          git commit -m "Update agenda data" || echo "No changes to commit"
          git push
